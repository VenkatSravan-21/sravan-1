<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GV SRAVAN — Biomedical & AI Engineering</title>
  <meta name="description"
    content="Portfolio of Guntumadugu Venkata Sravan — B.Tech Biomedical Engineering, Springer-published AI healthcare researcher.">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>⚡</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Sora:wght@400;500;600;700;800&display=swap');

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #050508;
      color: #cbd5e1;
      overflow-x: hidden
    }

    .font-display {
      font-family: 'Sora', sans-serif
    }

    ::-webkit-scrollbar {
      width: 5px
    }

    ::-webkit-scrollbar-track {
      background: #050508
    }

    ::-webkit-scrollbar-thumb {
      background: #1a1a2e;
      border-radius: 10px
    }

    /* ── Reveal (GPU) ── */
    .sr {
      opacity: 0;
      transform: translate3d(0, 28px, 0);
      transition: opacity .65s cubic-bezier(.215, .61, .355, 1), transform .65s cubic-bezier(.215, .61, .355, 1);
      will-change: opacity, transform
    }

    .sr.v {
      opacity: 1;
      transform: translate3d(0, 0, 0)
    }

    .sr-d1 {
      transition-delay: .07s
    }

    .sr-d2 {
      transition-delay: .14s
    }

    .sr-d3 {
      transition-delay: .21s
    }

    .sr-d4 {
      transition-delay: .28s
    }

    .sr-d5 {
      transition-delay: .35s
    }

    /* ── Navbar ── */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 60;
      transition: all .35s cubic-bezier(.215, .61, .355, 1)
    }

    .navbar.scrolled {
      background: rgba(5, 5, 8, .85);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border-bottom: 1px solid rgba(255, 255, 255, .04)
    }

    .nav-item {
      position: relative;
      font-size: .8125rem;
      font-weight: 500;
      color: #64748b;
      letter-spacing: .025em;
      padding: .25rem 0;
      transition: color .2s
    }

    .nav-item:hover,
    .nav-item.on {
      color: #e2e8f0
    }

    .nav-item::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 50%;
      width: 0;
      height: 1.5px;
      background: #3b82f6;
      border-radius: 2px;
      transition: width .25s, left .25s
    }

    .nav-item:hover::after,
    .nav-item.on::after {
      width: 100%;
      left: 0
    }

    /* ── Mobile drawer ── */
    .drawer-bg {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      backdrop-filter: blur(3px);
      opacity: 0;
      visibility: hidden;
      z-index: 70;
      transition: all .3s
    }

    .drawer-bg.show {
      opacity: 1;
      visibility: visible
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      width: min(280px, 80vw);
      height: 100dvh;
      background: rgba(8, 8, 14, .98);
      border-left: 1px solid rgba(255, 255, 255, .04);
      z-index: 80;
      transform: translate3d(100%, 0, 0);
      transition: transform .4s cubic-bezier(.16, 1, .3, 1);
      padding: 5rem 1.75rem 2rem;
      will-change: transform
    }

    .drawer.show {
      transform: translate3d(0, 0, 0)
    }

    .drawer-link {
      display: block;
      padding: .75rem 0;
      font-size: .9375rem;
      font-weight: 500;
      color: #94a3b8;
      border-bottom: 1px solid rgba(255, 255, 255, .03);
      transition: color .2s, padding-left .25s
    }

    .drawer-link:hover {
      color: #60a5fa;
      padding-left: 6px
    }

    .burger {
      display: flex;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      z-index: 90;
      position: relative
    }

    .burger span {
      display: block;
      width: 20px;
      height: 1.5px;
      background: #e2e8f0;
      border-radius: 2px;
      transition: all .25s cubic-bezier(.215, .61, .355, 1);
      transform-origin: center
    }

    .burger.x span:nth-child(1) {
      transform: rotate(45deg) translate(3.5px, 4.5px)
    }

    .burger.x span:nth-child(2) {
      opacity: 0;
      transform: scaleX(0)
    }

    .burger.x span:nth-child(3) {
      transform: rotate(-45deg) translate(3.5px, -4.5px)
    }

    /* ── Gradient text ── */
    .gt {
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 50%, #f472b6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    /* ── Card ── */
    .card {
      background: rgba(255, 255, 255, .02);
      border: 1px solid rgba(255, 255, 255, .04);
      border-radius: 1rem;
      transition: border-color .3s, box-shadow .3s, transform .3s cubic-bezier(.215, .61, .355, 1);
      will-change: transform
    }

    .card:hover {
      border-color: rgba(59, 130, 246, .1);
      box-shadow: 0 6px 32px -10px rgba(59, 130, 246, .07);
      transform: translate3d(0, -2px, 0)
    }

    /* ── Research glow card ── */
    .research-card {
      position: relative;
      overflow: hidden
    }

    .research-card::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1.5px;
      background: conic-gradient(from var(--angle, 0deg), transparent 40%, var(--glow-clr) 50%, transparent 60%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      opacity: 0;
      transition: opacity .4s;
      pointer-events: none
    }

    .research-card:hover::before {
      opacity: 1;
      animation: glow-rotate 3s linear infinite
    }

    @keyframes glow-rotate {
      to {
        --angle: 360deg
      }
    }

    @property --angle {
      syntax: '<angle>';
      initial-value: 0deg;
      inherits: false
    }

    .research-card .watermark-icon {
      transition: transform .6s cubic-bezier(.215, .61, .355, 1), opacity .4s
    }

    .research-card:hover .watermark-icon {
      transform: scale(1.15) rotate(-5deg);
      opacity: .06
    }

    .pulse-badge {
      animation: pulse-glow 2.5s ease-in-out infinite
    }

    @keyframes pulse-glow {

      0%,
      100% {
        box-shadow: 0 0 0 rgba(74, 222, 128, .15)
      }

      50% {
        box-shadow: 0 0 12px rgba(74, 222, 128, .25)
      }
    }

    .reading-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--glow-clr), transparent);
      width: 0;
      transition: width .6s cubic-bezier(.215, .61, .355, 1)
    }

    .research-card:hover .reading-bar {
      width: 100%
    }

    /* ── Project enhanced card ── */
    .project-card {
      position: relative;
      overflow: hidden
    }

    .project-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      box-shadow: inset 0 0 0 1.5px transparent;
      transition: box-shadow .4s;
      pointer-events: none
    }

    .project-card:hover::after {
      box-shadow: inset 0 0 0 1.5px var(--proj-clr, rgba(59, 130, 246, .15))
    }

    .project-card .proj-step {
      opacity: .7;
      transform: translate3d(-4px, 0, 0);
      transition: all .35s cubic-bezier(.215, .61, .355, 1)
    }

    .project-card:hover .proj-step {
      opacity: 1;
      transform: translate3d(0, 0, 0)
    }

    .project-card:hover .proj-step:nth-child(1) {
      transition-delay: 0s
    }

    .project-card:hover .proj-step:nth-child(2) {
      transition-delay: .06s
    }

    .project-card:hover .proj-step:nth-child(3) {
      transition-delay: .12s
    }

    .project-card:hover .proj-step:nth-child(4) {
      transition-delay: .18s
    }

    .proj-counter {
      font-variant-numeric: tabular-nums
    }

    .sec-label {
      font-size: .6875rem;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: #3b82f6
    }

    .caret {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: #3b82f6;
      margin-left: 2px;
      animation: blink 1.1s step-end infinite
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    /* ── Particles canvas ── */
    #particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none
    }

    /* ── Hero mesh gradient ── */
    .hero-mesh {
      position: absolute;
      inset: 0;
      overflow: hidden;
      z-index: 0
    }

    .hero-mesh .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: .06;
      will-change: transform
    }

    .hero-mesh .blob-1 {
      width: 600px;
      height: 600px;
      background: #3b82f6;
      top: -200px;
      left: -150px;
      animation: b1 18s ease-in-out infinite alternate
    }

    .hero-mesh .blob-2 {
      width: 500px;
      height: 500px;
      background: #8b5cf6;
      bottom: -200px;
      right: -150px;
      animation: b2 15s ease-in-out infinite alternate
    }

    .hero-mesh .blob-3 {
      width: 300px;
      height: 300px;
      background: #ec4899;
      top: 40%;
      left: 60%;
      animation: b3 12s ease-in-out infinite alternate
    }

    @keyframes b1 {
      to {
        transform: translate3d(60px, -40px, 0) scale(1.1)
      }
    }

    @keyframes b2 {
      to {
        transform: translate3d(-50px, 30px, 0) scale(.9)
      }
    }

    @keyframes b3 {
      to {
        transform: translate3d(-40px, -60px, 0) scale(1.15)
      }
    }

    .hero-frame {
      position: relative;
      border-radius: 1.25rem;
      overflow: hidden;
      border: 1.5px solid rgba(255, 255, 255, .06)
    }

    .hero-frame::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      background: linear-gradient(135deg, rgba(59, 130, 246, .2), transparent 40%, transparent 60%, rgba(139, 92, 246, .2));
      z-index: 1;
      pointer-events: none
    }

    /* ── Timeline ── */
    .tl-line {
      position: absolute;
      left: 17px;
      top: 0;
      bottom: 0;
      width: 1.5px;
      background: linear-gradient(180deg, #10b981, #3b82f6 60%, transparent)
    }

    .tl-dot {
      position: absolute;
      left: 10px;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2.5px solid;
      background: #050508;
      z-index: 2
    }

    /* ── Animated counter ── */
    .counter {
      font-variant-numeric: tabular-nums
    }

    /* ── Pill / Chip ── */
    .pill {
      padding: .375rem 1rem;
      border-radius: 9999px;
      font-size: .75rem;
      font-weight: 600;
      background: rgba(59, 130, 246, .06);
      border: 1px solid rgba(59, 130, 246, .1);
      color: #93c5fd;
      transition: all .2s
    }

    .pill:hover {
      background: rgba(59, 130, 246, .12);
      border-color: rgba(59, 130, 246, .2);
      transform: translate3d(0, -1px, 0)
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: .25rem .75rem;
      border-radius: 9999px;
      font-size: .6875rem;
      font-weight: 600;
      border: 1px solid
    }

    /* ── Edu card ── */
    .edu-item {
      padding: 1rem 1.25rem;
      border-radius: .75rem;
      border-left: 3px solid;
      background: rgba(255, 255, 255, .015);
      transition: background .2s
    }

    .edu-item:hover {
      background: rgba(255, 255, 255, .03)
    }

    .contact-icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, .06);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      transition: all .2s
    }

    .contact-icon:hover {
      color: #e2e8f0;
      border-color: rgba(59, 130, 246, .25);
      background: rgba(59, 130, 246, .06);
      transform: translate3d(0, -2px, 0)
    }

    .proj-img {
      position: relative;
      overflow: hidden
    }

    .proj-img img {
      transition: transform .5s cubic-bezier(.215, .61, .355, 1)
    }

    .proj-img:hover img {
      transform: scale(1.03)
    }

    /* ── Marquee skills ── */
    .marquee-track {
      display: flex;
      width: max-content;
      animation: marquee 30s linear infinite
    }

    @keyframes marquee {
      to {
        transform: translate3d(-50%, 0, 0)
      }
    }

    .marquee-track:hover {
      animation-play-state: paused
    }

    /* ── Responsive ── */
    @media(max-width:768px) {
      .hero-mesh .blob {
        filter: blur(70px);
        opacity: .04
      }

      .hero-mesh .blob-1 {
        width: 350px;
        height: 350px
      }

      .hero-mesh .blob-2 {
        width: 300px;
        height: 300px
      }

      .hero-mesh .blob-3 {
        width: 180px;
        height: 180px
      }
    }

    @media(max-width:480px) {
      .hero-mesh .blob {
        filter: blur(50px);
        opacity: .03
      }
    }
  </style>
</head>

<body>
  <canvas id="particles"></canvas>
  <div id="app"></div>

  <script>
    /* ── Particle system (lightweight, GPU-composited) ── */
    (function () {
      const c = document.getElementById('particles'), ctx = c.getContext('2d');
      let w, h, pts = [];
      const N = 50, mouse = { x: -1000, y: -1000 };

      function resize() { w = c.width = innerWidth; h = c.height = innerHeight }
      function init() { pts = []; for (let i = 0; i < N; i++)pts.push({ x: Math.random() * w, y: Math.random() * h, vx: (Math.random() - .5) * .3, vy: (Math.random() - .5) * .3, r: Math.random() * 1.5 + .5 }) }
      function draw() {
        ctx.clearRect(0, 0, w, h);
        for (let i = 0; i < pts.length; i++) {
          const p = pts[i];
          p.x += p.vx; p.y += p.vy;
          if (p.x < 0) p.x = w; if (p.x > w) p.x = 0; if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
          ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fillStyle = 'rgba(59,130,246,.15)'; ctx.fill();
          for (let j = i + 1; j < pts.length; j++) {
            const q = pts[j], dx = p.x - q.x, dy = p.y - q.y, d = dx * dx + dy * dy;
            if (d < 18000) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y); ctx.strokeStyle = `rgba(59,130,246,${.06 * (1 - d / 18000)})`; ctx.lineWidth = .5; ctx.stroke() }
          }
          const mdx = p.x - mouse.x, mdy = p.y - mouse.y, md = mdx * mdx + mdy * mdy;
          if (md < 25000) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(mouse.x, mouse.y); ctx.strokeStyle = `rgba(139,92,246,${.12 * (1 - md / 25000)})`; ctx.lineWidth = .6; ctx.stroke() }
        }
        requestAnimationFrame(draw);
      }
      addEventListener('resize', () => { resize(); init() }, { passive: true });
      addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY }, { passive: true });
      addEventListener('touchmove', e => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY }, { passive: true });
      resize(); init(); draw();
    })();
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    const Ic = ({ n, s = 18, c = '' }) => <i className={`fas fa-${n} ${c}`} style={{ fontSize: s }} />;
    const Br = ({ n, s = 18, c = '' }) => <i className={`fab fa-${n} ${c}`} style={{ fontSize: s }} />;

    /* ── scroll-reveal ── */
    const useReveal = () => {
      useEffect(() => {
        const io = new IntersectionObserver(
          es => es.forEach(e => { if (e.isIntersecting) e.target.classList.add('v'); }),
          { threshold: 0.06, rootMargin: '0px 0px -30px 0px' }
        );
        document.querySelectorAll('.sr').forEach(el => io.observe(el));
        return () => io.disconnect();
      }, []);
    };

    /* ── Animated counter hook ── */
    const useCounter = (end, duration = 1800) => {
      const [val, setVal] = useState(0);
      const ref = useRef(null);
      const started = useRef(false);
      useEffect(() => {
        const io = new IntersectionObserver(([e]) => {
          if (e.isIntersecting && !started.current) {
            started.current = true;
            const start = performance.now();
            const step = (now) => {
              const t = Math.min((now - start) / duration, 1);
              const eased = 1 - Math.pow(1 - t, 3);
              setVal(Math.round(eased * end));
              if (t < 1) requestAnimationFrame(step);
            };
            requestAnimationFrame(step);
          }
        }, { threshold: 0.5 });
        if (ref.current) io.observe(ref.current);
        return () => io.disconnect();
      }, [end, duration]);
      return [val, ref];
    };

    /* ═══════ NAVBAR ═══════ */
    const Nav = ({ active, go }) => {
      const [scrolled, setScrolled] = useState(false);
      const [open, setOpen] = useState(false);
      const links = ['home', 'about', 'experience', 'research', 'projects', 'activities', 'contact'];

      useEffect(() => {
        let ticking = false;
        const fn = () => { if (!ticking) { requestAnimationFrame(() => { setScrolled(window.scrollY > 40); ticking = false; }); ticking = true; } };
        addEventListener('scroll', fn, { passive: true });
        return () => removeEventListener('scroll', fn);
      }, []);

      // Lock body scroll when drawer open
      useEffect(() => { document.body.style.overflow = open ? 'hidden' : ''; return () => { document.body.style.overflow = ''; }; }, [open]);

      const nav = id => { go(id); setOpen(false); };

      return (
        <>
          <nav className={`navbar ${scrolled ? 'scrolled py-2.5' : 'py-4 md:py-5'}`}>
            <div className="max-w-[1080px] mx-auto px-5 sm:px-6 flex justify-between items-center">
              <button onClick={() => nav('home')} className="flex items-center gap-2.5 group">
                <div className="w-8 h-8 sm:w-9 sm:h-9 rounded-lg bg-gradient-to-br from-blue-500 to-violet-600 flex items-center justify-center text-white text-[.6875rem] sm:text-xs font-bold font-display shadow-md shadow-blue-500/20 group-hover:shadow-blue-500/30 transition-shadow">GV</div>
                <span className="font-display font-bold text-sm sm:text-[.9375rem] text-white tracking-tight hidden sm:block">SRAVAN</span>
              </button>
              <div className="hidden md:flex items-center gap-6 lg:gap-7">
                {links.map(l => (
                  <button key={l} onClick={() => nav(l)} className={`nav-item ${active === l ? 'on' : ''}`}>
                    {l.charAt(0).toUpperCase() + l.slice(1)}
                  </button>
                ))}
                <a href="cv.pdf" download className="ml-2 px-4 py-[.4375rem] rounded-lg text-xs font-semibold text-white bg-gradient-to-r from-blue-600 to-violet-600 hover:brightness-110 transition shadow-sm shadow-blue-500/15">
                  Resume <Ic n="arrow-down" s={10} c="ml-1" />
                </a>
              </div>
              <button className={`burger md:hidden ${open ? 'x' : ''}`} onClick={() => setOpen(!open)} aria-label="Menu">
                <span /><span /><span />
              </button>
            </div>
          </nav>
          <div className={`drawer-bg ${open ? 'show' : ''}`} onClick={() => setOpen(false)} />
          <div className={`drawer ${open ? 'show' : ''}`}>
            {links.map(l => <button key={l} onClick={() => nav(l)} className="drawer-link w-full text-left capitalize">{l}</button>)}
            <a href="cv.pdf" download className="drawer-link inline-flex items-center gap-2 text-blue-400 mt-2"><Ic n="arrow-down" s={13} /> Download Resume</a>
          </div>
        </>
      );
    };

    /* ═══════ HERO ═══════ */
    const Hero = ({ go }) => {
      const [typed, setTyped] = useState('');
      const text = 'AI-Powered Healthcare Researcher';
      useEffect(() => {
        let i = 0;
        const t = setInterval(() => { setTyped(text.slice(0, ++i)); if (i >= text.length) clearInterval(t); }, 45);
        return () => clearInterval(t);
      }, []);

      const [pubCount, pubRef] = useCounter(2, 1200);
      const [cgpa, cgpaRef] = useCounter(862, 1800);
      const [projCount, projRef] = useCounter(3, 1400);

      return (
        <section id="home" className="relative min-h-[100dvh] flex items-center pt-16 sm:pt-20 px-5 sm:px-6 overflow-hidden">

    /* ═══════ APP ═══════ */
    const App = () => {
      const [active, setActive] = useState('home');
      useReveal();

      useEffect(() => {
        const secs = document.querySelectorAll('section, footer');
        const io = new IntersectionObserver(
          es => es.forEach(e => { if (e.isIntersecting && e.target.id) setActive(e.target.id); }),
          { threshold: 0.2, rootMargin: '-60px 0px -35% 0px' }
        );
        secs.forEach(s => { if (s.id) io.observe(s); });
        return () => io.disconnect();
      }, []);

      const go = useCallback(id => {
        document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
      }, []);

      return (
        <div className="min-h-screen relative z-10">
          <Nav active={active} go={go} />

          <SkillsMarquee />
